name: Release

on:
  push:
    branches:
      - release
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  tag:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver tag
        id: bump
        run: |
          set -e
          git fetch --tags --force
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            new="v0.1.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "$ver"
            patch=$((patch + 1))
            new="v${major}.${minor}.${patch}"
          fi
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [tag]
    if: always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ needs.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          mkdir -p dist
          name="themis-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${name}" .
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "${name%.exe}.zip" "${name}"
            sha256sum "${name%.exe}.zip" > "${name%.exe}.zip.sha256"
          else
            tar -czf "${name}.tar.gz" "${name}"
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: themis-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: [tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          name: ${{ steps.ref.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
